<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Manager v1.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">🛠️ Asset Manager <span class="v-tag">v1.0</span></div>
        <button id="exportCsv" class="secondary-btn">📥 Export to CSV</button>
    </header>

    <div class="container">
        <section class="card">
            <h2>Add New Asset</h2>
            <div class="form-row">
                <input type="text" id="assetName" placeholder="Asset Name">
                <input type="text" id="serialNum" placeholder="Serial Number">
                <input type="text" id="location" placeholder="Location">
                <select id="status">
                    <option value="Operational">✅ Operational</option>
                    <option value="Maintenance">🔧 Maintenance</option>
                    <option value="Broken">❌ Broken</option>
                </select>
                <button onclick="addAsset()" class="primary-btn">Save Asset</button>
            </div>
        </section>

        <section class="controls">
            <input type="text" id="searchBar" onkeyup="filterAssets()" placeholder="Search assets by name or serial...">
        </section>

        <section class="card">
            <table>
                <thead>
                    <tr>
                        <th>Asset Name</th>
                        <th>Serial #</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="assetTableBody">
                    </tbody>
            </table>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
