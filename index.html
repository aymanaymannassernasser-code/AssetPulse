<header>
    <div class="logo">🛠️ MOPCO Asset Tracker <span class="v-tag">v1.2</span></div>
    <div class="actions">
        <input type="file" id="importCsv" accept=".csv" hidden>
        <button class="secondary-btn" onclick="document.getElementById('importCsv').click()">📤 Import MOPCO CSV</button>
        <button id="exportCsv" class="secondary-btn">📥 Export CSV</button>
    </div>
</header>

<div class="container">
    <div id="statsBar" class="stats-grid">
        <div class="stat-card">Total Motors: <span id="totalCount">0</span></div>
        <div class="stat-card">In Operation: <span id="opCount">0</span></div>
        <div class="stat-card">Needs Maintenance: <span id="maintCount">0</span></div>
    </div>

    <section class="controls">
        <input type="text" id="searchBar" onkeyup="filterAssets()" placeholder="Search by TAG No., Area, or KW...">
    </section>

    <section class="card">
        <div class="table-container">
            <table id="assetTable">
                <thead>
                    <tr>
                        <th>TAG No.</th>
                        <th>Process Area</th>
                        <th>KW</th>
                        <th>RPM</th>
                        <th>Bearing (DE)</th>
                        <th>Status</th>
                        <th>Last Greasing</th>
                    </tr>
                </thead>
                <tbody id="assetTableBody"></tbody>
            </table>
        </div>
    </section>
</div>
