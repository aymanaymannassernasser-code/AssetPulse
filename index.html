<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Manager v1.0</title>
    <link rel="stylesheet" href="asset-style.css">
</head>
<body>
    <nav>
        <h1>🛠️ Asset Manager <span class="version">v1.0</span></h1>
        <button id="exportBtn" class="btn-ui">📥 Export to Excel (CSV)</button>
    </nav>

    <main>
        <section id="inputForm">
            <h3>Add New Asset</h3>
            <div class="form-group">
                <input type="text" id="assetName" placeholder="Asset Name (e.g. Motor A1)">
                <input type="text" id="serialNum" placeholder="Serial Number">
                <input type="text" id="location" placeholder="Location/Area">
                <select id="status">
                    <option value="Operational">✅ Operational</option>
                    <option value="Maintenance">🔧 Maintenance</option>
                    <option value="Broken">❌ Broken</option>
                </select>
                <button onclick="addAsset()" class="btn-primary">Add Asset</button>
            </div>
        </section>

        <section id="inventory">
            <h3>Current Inventory</h3>
            <table id="assetTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Serial #</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="assetBody">
                    </tbody>
            </table>
        </section>
    </main>
    <script src="asset-app.js"></script>
</body>
</html>
